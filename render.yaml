services:
  # ──────────────────────────────────────────────
  # FastAPI Backend API
  # ──────────────────────────────────────────────
  - type: web
    name: burnout-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Set in Render dashboard: your Supabase PostgreSQL URL
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: OPENAI_API_KEY
        sync: false   # Set in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: SUPABASE_URL
        sync: false   # Set in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false   # Set in Render dashboard
      - key: SUPABASE_SECRET_KEY
        sync: false   # Set in Render dashboard
      - key: CORS_ORIGINS
        value: '["*"]'

  # ──────────────────────────────────────────────
  # React Web Frontend (Static Site)
  # ──────────────────────────────────────────────
  - type: web
    name: burnout-web
    env: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: burnout-backend
          type: web
          property: host
