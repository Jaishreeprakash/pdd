services:
  # FastAPI Backend API
  - type: web
    name: burnout-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: burnout-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: OPENAI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini

databases:
  - name: burnout-db
    databaseName: burnout_db
    user: burnout_user
    plan: free
